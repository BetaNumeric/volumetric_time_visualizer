                const startTime = parseFloat(trimStartInput.value);
                const endTime = parseFloat(trimEndInput.value);
                const trimDuration = Math.max(0.1, endTime - startTime);

                // Save Gen Params for visibility logic
                stackGenParams.start = startTime;
                stackGenParams.duration = trimDuration;

                // Update limits
                updateFrameSliderLimits();
                
                targetFrameCount = parseInt(inputs.count.value);
                const maxRes = parseInt(resolutionSelect.value);
                
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const dimensions = getDisplayTextureDimensions(maxRes);
                canvas.width = dimensions.width;
                canvas.height = dimensions.height;

                const frames = [];
                extractedFrames = frames;

                for (let i = 0; i < targetFrameCount; i++) {
                    updateProcessingProgress(i, targetFrameCount);

                    const sampleT = targetFrameCount > 1 ? i / (targetFrameCount - 1) : 0;
                    const currentTime = Math.min(startTime + sampleT * trimDuration, duration);
                    video.currentTime = currentTime;

                    await new Promise(r => {
                        let resolved = false;
                        const finishSeek = () => {
                            if(resolved) return;
                            resolved = true;
                            clearTimeout(timeoutHandler);
                            video.removeEventListener('seeked', finishSeek);
                            r();
                        };
                        const timeoutHandler = setTimeout(finishSeek, 800);
                        video.addEventListener('seeked', finishSeek);
                    });

                    drawContainedFrame(ctx, video, video.videoWidth, video.videoHeight, canvas.width, canvas.height);

                    frames.push(createTextureFrameFromCanvas(canvas));

                    await new Promise(r => setTimeout(r, 10)); // Yield
                }

                if (frames.length === 0) {
                    throw new Error('No frames were extracted');
                }

                progressBar.style.width = '100%';
                progressText.textContent = '100%';
                buildStack(frames);
                didBuildStack = true;
            } catch(e) {
                console.error(e);
                statusText.textContent = "ERROR PROCESSING VIDEO";
                progressText.textContent = "0%";
                progressBar.style.width = '0%';
            } finally {
                if (video) {
                    video.pause();
                    video.removeAttribute('src');
                    video.load();
                    if (video.parentNode) {
                        video.parentNode.removeChild(video);
                    }
                }
                if (objectUrl) {
                    URL.revokeObjectURL(objectUrl);
                }

                isProcessing = false;
                controlsArea.classList.remove('opacity-50', 'pointer-events-none');

                if (didBuildStack) {
                    statusContainer.classList.add('hidden');
                    togglePanel(false);
                } else {
                    extractedFrames.forEach(frame => {
                        if (frame.texture) {
                            frame.texture.dispose();
                        }
                    });
                }
            }
        }

        async function processImageSequenceSource(files, metadataFile = null) {
            if (!files || files.length === 0 || isProcessing) return;

            const sequenceFiles = Array.from(files).filter(isImageFile).sort(compareSequenceFiles);
            if (sequenceFiles.length === 0) return;

            isProcessing = true;
            let didBuildStack = false;
            let extractedFrames = [];

            statusContainer.classList.remove('hidden');
            controlsArea.classList.add('opacity-50', 'pointer-events-none');
            statusText.textContent = 'PROCESSING IMAGES...';
            progressText.textContent = '0%';
            progressBar.style.width = '0%';

            try {
                const sequenceMetadata = await loadSequenceMetadata(metadataFile);

                resetPlaybackState();
                clearStack();

                const signature = getFilesSignature(metadataFile ? [...sequenceFiles, metadataFile] : sequenceFiles);
                const duration = getSequenceDuration(sequenceFiles.length, parseInt(fpsSelect.value));
                const isNewSource = currentSourceType !== 'sequence'
                    || currentSourceSignature !== signature
                    || Math.abs(currentSourceDuration - duration) > 0.1;

                currentSourceType = 'sequence';
                currentSourceDuration = duration;
                currentSourceSignature = signature;
                currentSequenceFiles = sequenceFiles;
                setTrimRange(duration, isNewSource);

                updateFrameSliderLimits();

                const trimRange = getSequenceTrimRange(sequenceFiles.length);
                const trimmedFiles = sequenceFiles.slice(trimRange.startIndex, trimRange.endIndex + 1);
                if (trimmedFiles.length === 0) {
                    throw new Error('No images were selected for the current trim range');
                }

                if (isNewSource) {
                    inputs.count.value = trimmedFiles.length;
                }

                targetFrameCount = Math.min(parseInt(inputs.count.value), trimmedFiles.length);
                inputs.count.value = targetFrameCount;
                displays.count.textContent = targetFrameCount;
                applySequenceGeometry(sequenceMetadata, targetFrameCount, Boolean(metadataFile));

                const startTime = parseFloat(trimStartInput.value);
                const endTime = parseFloat(trimEndInput.value);
                const trimDuration = Math.max(0.1, endTime - startTime);

                stackGenParams.start = startTime;
                stackGenParams.duration = trimDuration;

                const maxRes = parseInt(resolutionSelect.value);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const frames = [];
                extractedFrames = frames;

                for (let i = 0; i < targetFrameCount; i++) {
                    updateProcessingProgress(i, targetFrameCount);

                    const sampleT = targetFrameCount > 1 ? i / (targetFrameCount - 1) : 0;
                    const sourceIndex = Math.min(Math.round(sampleT * (trimmedFiles.length - 1)), trimmedFiles.length - 1);
                    const drawable = await loadDrawableFromImageFile(trimmedFiles[sourceIndex]);
                    try {
                        const sourceDimensions = getDrawableDimensions(drawable);
                        const dimensions = getDisplayTextureDimensions(maxRes);

                        canvas.width = dimensions.width;
                        canvas.height = dimensions.height;
                        drawContainedFrame(
                            ctx,
                            drawable,
                            sourceDimensions.width,
                            sourceDimensions.height,
                            canvas.width,
                            canvas.height
                        );

                        frames.push(createTextureFrameFromCanvas(canvas));
                    } finally {
                        disposeDrawable(drawable);
                    }
                }

                if (frames.length === 0) {
                    throw new Error('No images were loaded');
                }

                progressBar.style.width = '100%';
                progressText.textContent = '100%';
                buildStack(frames);
                didBuildStack = true;
            } catch(e) {
                console.error(e);
                statusText.textContent = "ERROR PROCESSING IMAGES";
                progressText.textContent = "0%";
                progressBar.style.width = '0%';
            } finally {
                isProcessing = false;
                controlsArea.classList.remove('opacity-50', 'pointer-events-none');

                if (didBuildStack) {
                    statusContainer.classList.add('hidden');
                    togglePanel(false);
                } else {
                    extractedFrames.forEach(frame => {
                        if (frame.texture) {
                            frame.texture.dispose();
                        }
                    });
                }
            }
        }

        function clearStack() {
            disposeExposure();

            const disposedGeometries = new Set();
            const disposedTextures = new Set();

            const disposeGeometry = (geometry) => {
                if (!geometry || disposedGeometries.has(geometry)) return;
                geometry.dispose();
                disposedGeometries.add(geometry);
            };

            const disposeTexture = (texture) => {
                if (!texture || disposedTextures.has(texture)) return;
                texture.dispose();
                disposedTextures.add(texture);
            };

            while(stackGroup.children.length > 0){ 
                const mesh = stackGroup.children[0];
                disposeGeometry(mesh.geometry);
                if(mesh.material) {
                    if(mesh.material.uniforms && mesh.material.uniforms.map) {
                        disposeTexture(mesh.material.uniforms.map.value);
                    }
                    mesh.material.dispose();
                }
                stackGroup.remove(mesh); 
            }
            frameMeshes = [];
            
            if(scannerMesh) {
                scene.remove(scannerMesh);
                disposeGeometry(scannerMesh.geometry);
                if(scannerMesh.material) {
                    if(scannerMesh.material.uniforms && scannerMesh.material.uniforms.map) {
                        disposeTexture(scannerMesh.material.uniforms.map.value);
                    }
                    scannerMesh.material.dispose();
                }
                scannerMesh = null;
            }
        }

        function buildStack(frames) {
            if(frames.length === 0) return;
            
            const spacing = getCurrentSpacingCm();
            const initialOpacity = parseFloat(inputs.opacity.value);
            const initialThreshold = parseFloat(inputs.threshold.value);
            const initialBrightThreshold = parseFloat(inputs.brightThreshold.value);
            const modeName = inputs.blendMode.value;
            const startOffset = getStackStartCm();
            const scale = parseFloat(inputs.scale.value);
            const stackHeight = getStackHeightCm(frames.length, spacing);
            const centerY = (startOffset + (stackHeight / 2)) * scale;

            const geometry = new THREE.PlaneGeometry(DISPLAY_WIDTH_CM, DISPLAY_HEIGHT_CM);

            frames.forEach((frameData, index) => {
                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        map: { value: frameData.texture },
                        globalOpacity: { value: initialOpacity },
                        threshold: { value: initialThreshold },
                        brightThreshold: { value: initialBrightThreshold }
                    },
                    vertexShader: vertexShader,
                    fragmentShader: fragmentShader,
                    transparent: true,
                    side: THREE.DoubleSide,
                    depthWrite: false
                });

                material.blending = THREE[modeName];

                const plane = new THREE.Mesh(geometry, material);
                plane.rotation.x = -Math.PI / 2;
                plane.position.y = startOffset + (index * spacing);

                stackGroup.add(plane);
                frameMeshes.push(plane);
            });

            const scannerMat = new THREE.ShaderMaterial({
                uniforms: {
                    map: { value: frames[0].texture }, 
                    globalOpacity: { value: initialOpacity },
                    threshold: { value: initialThreshold },
                    brightThreshold: { value: initialBrightThreshold }
                },
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            scannerMat.blending = THREE[modeName];
            
            scannerMesh = new THREE.Mesh(geometry, scannerMat);
            scannerMesh.rotation.x = -Math.PI / 2;
            scannerMesh.visible = false;
            scannerMesh.scale.copy(stackGroup.scale); // Sync scale
            scene.add(scannerMesh);

            controls.target.set(0, centerY, 0);
            
            const cameraDistance = Math.max(DISPLAY_WIDTH_CM, DISPLAY_HEIGHT_CM, stackHeight, TRAVEL_DISTANCE_CM) * Math.max(scale, 0.1);
            activeCamera.position.set(cameraDistance, centerY + (cameraDistance * 0.65), cameraDistance);
            activeCamera.lookAt(0, centerY, 0);
            
            controls.autoRotate = false;
            markExposureDirty('NEEDS BAKE');
        }

        function updateSpacing(val) {
            const startOffset = getStackStartCm();
            stackGroup.children.forEach((mesh, index) => {
                mesh.position.y = startOffset + (index * val);
            });
            if(stackGroup.children.length > 0) {
                updateControlsTargetForStack();
            }
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;

            perspCamera.aspect = aspect;
            perspCamera.updateProjectionMatrix();

            orthoCamera.left = -ORTHO_VIEW_SIZE * aspect / 2;
            orthoCamera.right = ORTHO_VIEW_SIZE * aspect / 2;
            orthoCamera.top = ORTHO_VIEW_SIZE / 2;
            orthoCamera.bottom = -ORTHO_VIEW_SIZE / 2;
            orthoCamera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
            markExposureDirty('VIEW CHANGED');
        }

        function updateVisibility() {
            if (stackGroup.children.length === 0) return;

            const isSmooth = smoothToggle.checked;
            const spacing = getCurrentSpacingCm();
            
            if (playback.mode === 'scan' && isSmooth && scannerMesh) {
                stackGroup.visible = false;
                scannerMesh.visible = true;

                scannerMesh.position.y = (getStackStartCm() + (playback.currentIndex * spacing)) * stackGroup.scale.y;
                
                const texIndex = Math.min(Math.floor(playback.currentIndex), frameMeshes.length - 1);
                const frameMesh = frameMeshes[texIndex];
                if(frameMesh && frameMesh.material.uniforms.map.value) {
                     scannerMesh.material.uniforms.map.value = frameMesh.material.uniforms.map.value;
                }

                return; 
            }

            stackGroup.visible = true;
            if(scannerMesh) scannerMesh.visible = false;

            const current = Math.floor(playback.currentIndex);
            const total = stackGroup.children.length;
            const uiStart = parseFloat(trimStartInput.value);
            const uiEnd = parseFloat(trimEndInput.value);
            
            stackGroup.children.forEach((mesh, index) => {
                let shouldBeVisible = false;

                if (playback.mode === 'static') {
                    // Check trim preview
                    const sliceTime = getSliceTime(index, total);
                    // Fuzzy match due to float precision
                    if (sliceTime >= uiStart - 0.01 && sliceTime <= uiEnd + 0.01) {
                        shouldBeVisible = true;
                    }
                } else if (playback.mode === 'scan') {
                    if (index === current) shouldBeVisible = true;
                } else if (playback.mode === 'build') {
                    if (index <= current) shouldBeVisible = true;
                }
                
                mesh.visible = shouldBeVisible;
            });
        }

        function animate(time = performance.now()) {
            requestAnimationFrame(animate);
            const deltaSeconds = playback.lastTime
                ? Math.min((time - playback.lastTime) / 1000, 0.1)
                : 0;
            playback.lastTime = time;

            controls.update();

            if (exposurePreviewVisible) {
                scene.background = backgroundColor;
                renderer.autoClear = true;
                renderExposureView();
                lastCameraPos.copy(activeCamera.position);
                lastCameraQuat.copy(activeCamera.quaternion);
                return;
            }

            // --- Light Painting Logic ---
            const isPainting = playback.mode === 'scan' && lightPaintToggle.checked;
            
            if (isPainting) {
                scene.background = null;

                const dist = activeCamera.position.distanceTo(lastCameraPos);
                const rot = activeCamera.quaternion.angleTo(lastCameraQuat);
                
                if (dist > 0.001 || rot > 0.001) {
                    renderer.clear();
                } else {
                    renderer.autoClear = false;
                }
            } else {
                scene.background = backgroundColor;
                renderer.autoClear = true;
            }

            lastCameraPos.copy(activeCamera.position);
            lastCameraQuat.copy(activeCamera.quaternion);

            renderer.render(scene, activeCamera);

            if (playback.isPlaying && stackGroup.children.length > 0) {
                const totalFrames = stackGroup.children.length;
                const framesPerSecond = 30 * playback.speed; 
                
                playback.currentIndex += framesPerSecond * deltaSeconds * playback.direction;

                if (playback.loop) {
                    if (playback.currentIndex >= totalFrames - 0.1) {
                        playback.currentIndex = totalFrames - 0.1;
                        playback.direction = -1;
                    } else if (playback.currentIndex <= 0) {
                        playback.currentIndex = 0;
                        playback.direction = 1;
                    }
                } else {
                    if (playback.direction === 1 && playback.currentIndex >= totalFrames - 0.1) {
                        playback.currentIndex = totalFrames - 0.1;
                        playback.isPlaying = false;
                        playPauseBtn.textContent = 'Play';
                    } else if (playback.direction === -1 && playback.currentIndex <= 0) {
                        playback.currentIndex = 0;
                        playback.isPlaying = false;
                        playPauseBtn.textContent = 'Play';
                    }
                }
                
                const pct = (playback.currentIndex / (totalFrames - 1)) * 100;
                timelineInput.value = pct;

                updateVisibility();
            } else if (!playback.isPlaying && playback.mode === 'scan' && smoothToggle.checked) {
                updateVisibility();
            }
        }

        init();
    </script>
</body>
</html>
